# /etc/systemd/system/ndvi-capture.service.d/test.conf
#
# Drop-in override that puts the service into test mode.
# This file layers on top of ndvi-capture.service without modifying it,
# so switching back to production is a single command.
#
# Enable test mode:
#   sudo mkdir -p /etc/systemd/system/ndvi-capture.service.d/
#   sudo cp test.conf /etc/systemd/system/ndvi-capture.service.d/
#   sudo systemctl daemon-reload
#   sudo systemctl restart ndvi-capture.service
#
# Return to production (removes override, no service file changes needed):
#   sudo rm /etc/systemd/system/ndvi-capture.service.d/test.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart ndvi-capture.service

[Service]
# Unset the production save path first, then set a separate test output dir
# so test images never mix with real flight data.
Environment=
Environment="NDVI_SAVE_PATH=/home/sr-design/agrodrone-system/test-images"
Environment="NDVI_CAPTURE_PIN=27"
Environment="NDVI_KILL_PIN=17"
Environment="NDVI_TEST_MODE=1"
Environment="NDVI_TEST_COUNT=5"

# Test runs exit on their own — don't restart automatically.
Restart=no
